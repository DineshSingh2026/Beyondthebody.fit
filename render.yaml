# Render Blueprint — Beyond The Body
# Repo: https://github.com/DineshSingh2026/Beyondthebody.fit
# Docs: https://render.com/docs/blueprint-spec
#
# DEPLOYMENT ORDER:
#   1. This file deploys TWO web services + ONE database.
#   2. After first deploy, copy the public URL of `beyond-the-body-api`
#      (e.g. https://beyond-the-body-api.onrender.com) and paste it as
#      NEXT_PUBLIC_API_URL in the `beyond-the-body` service env vars,
#      then trigger a manual redeploy of the frontend.

databases:
  - name: beyond-the-body-db
    plan: free

services:
  # ──────────────────────────────────────────────
  # 1. Express API backend  (server.js at repo root)
  # ──────────────────────────────────────────────
  - type: web
    name: beyond-the-body-api
    runtime: node
    plan: free

    # server.js lives at the repo root — no rootDir needed
    buildCommand: npm install
    startCommand: node server.js

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: beyond-the-body-db
          property: connectionString
      # Random HMAC secret — Render auto-generates a secure value
      - key: AUTH_SECRET
        generateValue: true
      # Optional: override default admin/therapist passwords
      # - key: ADMIN_PASSWORD
      #   value: Admin@BTB2026
      # - key: THERAPIST_PASSWORD
      #   value: Therapist@BTB2026
      # CORS: set this to your frontend domain after deploy
      # e.g. https://beyond-the-body.onrender.com or https://beyondthebody.fit
      - key: FRONTEND_URL
        sync: false

  # ──────────────────────────────────────────────
  # 2. Next.js frontend  (frontend/ sub-directory)
  # ──────────────────────────────────────────────
  - type: web
    name: beyond-the-body
    runtime: node
    plan: free

    rootDir: frontend

    buildCommand: npm install && npm run build
    startCommand: npm run start

    envVars:
      # REQUIRED for login/dashboard: backend API URL (no trailing slash).
      # Without this, login shows "Failed to fetch". Set then redeploy frontend.
      # e.g. https://api.beyondthebody.fit or https://beyond-the-body-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false
